<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Sarabun', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: #0f172a;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  background-color: #f0f9ff;
}
.background-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
.gradient-bg {
  background: url('https://images.unsplash.com/photo-1514944982689-6e1e6d7ffd9f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
  background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
  position: relative; overflow: hidden;
}
.gradient-bg::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(224, 242, 254, 0.4) 0%, rgba(186, 230, 253, 0.3) 100%);
  animation: gradientShift 15s ease infinite; background-size: 200% 200%;
}
@keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.floating { position: absolute; background: rgba(255, 255, 255, 0.1); border-radius: 50%; filter: blur(40px); animation: float 20s ease-in-out infinite; }
.float-1 { width: 300px; height: 300px; top: 10%; left: 10%; animation-delay: 0s; background: rgba(186, 230, 253, 0.35); }
.float-2 { width: 400px; height: 400px; bottom: 10%; right: 10%; animation-delay: 5s; animation-duration: 25s; background: rgba(125, 211, 252, 0.25); }
@keyframes float {
  0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }

  50% { transform: translateY(10px) translateX(-15px) rotate(-2deg); }
  75% { transform: translateY(-15px) translateX(-5px) rotate(1deg); }
}
.pattern-bg { opacity: 0.08; z-index: 2; }
.image-bg { opacity: 0.15; z-index: 3; }
.image-bg img { width: 100%; height: 100%; object-fit: cover; }
.decorative-bg { z-index: 4; pointer-events: none; }

}

.container { max-width: 1024px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 2rem; }
.card {

.bar-label { display: flex; justify-content: space-between; margin-bottom: 0.25rem; font-size: 0.9rem; }
.bar-container { height: 1rem; background: rgba(229, 231, 235, 0.5); border-radius: 9999px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(to right, #0284c7, #0ea5e9); border-radius: 9999px; transition: width 0.3s ease; }

.server-status.connected { background: rgba(224, 242, 254, 0.95); color: #0369a1; border: 1px solid #bae6fd; }
.server-status.disconnected { background: rgba(254, 242, 242, 0.95); color: #dc2626; border: 1px solid #fecaca; }

@media (max-width: 768px) { .card-title { font-size: 1.5rem; } .preview-image { max-width: 100%; } .nav-buttons { flex-direction: column; gap: 0.5rem; } }
</style>
</head>

<script>
let selectedImage = null;
let isLoading = false;
let serverConnected = false;


const fileInput = document.getElementById('fileInput');
const imagePreview = document.getElementById('imagePreview');
const previewImage = document.getElementById('previewImage');
const analyzeBtn = document.getElementById('analyzeBtn');
const errorAlert = document.getElementById('errorAlert');
const errorMessage = document.getElementById('errorMessage');
const resultContent = document.getElementById('resultContent');
const serverStatus = document.getElementById('serverStatus');

async function checkServerConnection() {
  try {
    const response = await fetch('http://127.0.0.1:5000/health', { method: 'GET', mode: 'cors' });
    if (response.ok) {
      serverConnected = true;
      serverStatus.className = 'server-status connected';
      serverStatus.innerHTML = '<i class="fas fa-check-circle"></i> เชื่อมต่อเซิร์ฟเวอร์สำเร็จ | พร้อมวิเคราะห์ภาพ';
    } else { throw new Error(); }
  } catch {
    serverConnected = false;
    serverStatus.className = 'server-status disconnected';
    serverStatus.innerHTML = '<i class="fas fa-times-circle"></i> ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ (ตรวจสอบ Backend)';
  }
}

function handleUploadClick() { fileInput.click(); }
function handleImageSelect(event) {
  const file = event.target.files[0];
  if (file) {
    if (!['image/jpeg','image/jpg','image/png','image/webp'].includes(file.type)) { showError('กรุณาเลือกไฟล์ภาพประเภท JPG, JPEG, PNG หรือ WebP เท่านั้น'); fileInput.value=''; return; }
    if (file.size > 10*1024*1024) { showError('ขนาดไฟล์ใหญ่เกินไป กรุณาเลือกไฟล์ที่มีขนาดไม่เกิน 10 MB'); fileInput.value=''; return; }
    selectedImage = file;
    previewImage.src = URL.createObjectURL(file);
    imagePreview.style.display = 'flex';
    analyzeBtn.disabled = false;
    hideError(); showEmptyState();
  }
}

async function analyzeImage() {
  if (!selectedImage) { showError('กรุณาเลือกภาพก่อนวิเคราะห์'); return; }
  if (!serverConnected) { showError('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กรุณาตรวจสอบการเชื่อมต่อ'); return; }
  setLoading(true); hideError();
  const formData = new FormData(); formData.append('image', selectedImage);
  try {
    const res = await fetch('http://127.0.0.1:5000/predict', { method: 'POST', body: formData, mode: 'cors' });
    if (!res.ok) throw new Error(`HTTP status ${res.status}`);
    const data = await res.json();
    if (data.success && data.prediction) showResult(data.prediction, data.all_probabilities);
    else throw new Error('Invalid response format');
  } catch (err) { showError('เกิดข้อผิดพลาดในการวิเคราะห์ภาพ: ' + err.message); }
  finally { setLoading(false); }
}

function setLoading(loading) {
  isLoading = loading;
  analyzeBtn.innerHTML = loading ? `<div class="spinner"></div> กำลังวิเคราะห์ภาพ...` : `<i class="fas fa-search icon"></i> วิเคราะห์ภาพ`;
  analyzeBtn.disabled = loading || !selectedImage;
}
function showError(msg) { errorMessage.textContent = msg; errorAlert.style.display = 'block'; errorAlert.className = 'alert'; }
function hideError() { errorAlert.style.display = 'none'; }

function showResult(topPrediction, allPredictions) {
  const className = topPrediction.class;
  const confidence = topPrediction.confidence;
  const fishData = fishDatabase[className] || {
    classification: 'ไม่ทราบสายพันธุ์',
    type: 'ไม่ระบุ',
    info: ['ไม่พบข้อมูลสำหรับปลาชนิดนี้ในฐานข้อมูล', 'กรุณาตรวจสอบภาพหรือปรึกษาผู้เชี่ยวชาญ']
  };

  let badgeClass = 'classification-healthy';
  if (fishData.type.includes('ทะเล')) badgeClass = 'classification-pest';
  else if (fishData.type.includes('จืด')) badgeClass = 'classification-disease';

  const top5 = Array.isArray(allPredictions) 
    ? allPredictions.filter(p => p.probability > 0.01).sort((a, b) => b.probability - a.probability).slice(0, 5)
    : [];
  
  const chartHTML = top5.length > 0 ? top5.map(p => `
    <div class="probability-bar">
      <div class="bar-label"><span>${p.class.replace(/-/g, ' ')}</span><span>${(p.probability * 100).toFixed(1)}%</span></div>
      <div class="bar-container"><div class="bar-fill" style="width:${(p.probability * 100).toFixed(1)}%"></div></div>
    </div>`).join('') 
    : '<p style="text-align:center; color:#64748b; padding:1rem;">ไม่มีข้อมูลความน่าจะเป็นเพิ่มเติม</p>';

  const infoListHTML = fishData.info.map(item => `
    <li class="treatment-item">
      <span class="treatment-bullet"><i class="fas fa-info-circle"></i></span>
      <span>${item}</span>
    </li>`).join('');

  resultContent.innerHTML = `
    <div class="result-container">
      <div class="disease-info">
        <div class="disease-name">${className.replace(/-/g, ' ')}</div>
        <div class="classification-badge ${badgeClass}"><i class="fas fa-tag"></i> ${fishData.type}</div>
        <div class="confidence-badge"><i class="fas fa-chart-line"></i> ความมั่นใจ: ${(confidence * 100).toFixed(2)}%</div>
      </div>
      <h4 class="treatment-title"><i class="fas fa-book-open"></i> ข้อมูลสายพันธุ์และลักษณะเด่น</h4>
      <ul class="treatment-list">${infoListHTML}</ul>
      <div class="probability-chart">
        <h4 class="chart-title"><i class="fas fa-chart-bar"></i> ความน่าจะเป็นของผลลัพธ์ (Top 5)</h4>
        ${chartHTML}
      </div>
    </div>`;
}

function showEmptyState() { resultContent.innerHTML = `<div class="empty-state"><i class="fas fa-water leaf-icon" style="font-size:5rem;"></i><p style="font-size:1.25rem;margin-top:1rem;">กรุณาอัปโหลดและวิเคราะห์ภาพเพื่อดูผลลัพธ์</p></div>`; }
function scrollToSection(id) { document.getElementById(id)?.scrollIntoView({ behavior:'smooth', block:'start' }); }

document.addEventListener('DOMContentLoaded', () => { showEmptyState(); checkServerConnection(); setInterval(checkServerConnection, 30000); });
</script>
</body>
</html>
